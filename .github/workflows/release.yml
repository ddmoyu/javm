name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    outputs:
      release_id: ${{ steps.resolve_release_id.outputs.release_id }}
      release_body: ${{ steps.release_notes.outputs.release_body }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          if ($tag -match '-') {
            "is_prerelease=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "is_prerelease=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Resolve release notes
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $releaseNotesPath = Join-Path $PWD "docs/releases/$tag.md"

          if (Test-Path $releaseNotesPath) {
            "body_path=$releaseNotesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            $releaseBody = Get-Content -Path $releaseNotesPath -Raw -Encoding utf8
            "release_body<<JAVM_RELEASE_BODY" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            $releaseBody | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "JAVM_RELEASE_BODY" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          $fallbackPath = Join-Path $PWD 'release-body.md'
          @(
            "# JAVM $tag"
            ''
            '## 说明'
            '- 当前版本未提交专用发布日志文件。'
            "- 请优先在仓库中补充 docs/releases/$tag.md，供 Release 页面直接使用。"
          ) | Set-Content -Path $fallbackPath -Encoding utf8

          "body_path=$fallbackPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $releaseBody = Get-Content -Path $fallbackPath -Raw -Encoding utf8
          "release_body<<JAVM_RELEASE_BODY" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $releaseBody | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "JAVM_RELEASE_BODY" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create or update GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_notes.outputs.body_path }}
          draft: true
          prerelease: ${{ steps.release_meta.outputs.is_prerelease == 'true' }}

      - name: Resolve release id
        id: resolve_release_id
        shell: pwsh
        run: |
          $releaseId = '${{ steps.create_release.outputs.id }}'

          if ([string]::IsNullOrWhiteSpace($releaseId)) {
            throw "未能从 create_release 步骤获取 release id。"
          }

          "release_id=$releaseId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Clean existing release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        timeout-minutes: 5
        run: |
          $repo = '${{ github.repository }}'
          $releaseId = '${{ steps.resolve_release_id.outputs.release_id }}'

          if ([string]::IsNullOrWhiteSpace($releaseId)) {
            Write-Host '缺少 release id，跳过资产清理。'
            exit 0
          }

          Write-Host "检查 release $releaseId 的已存在资产..."

          try {
            $assetsJson = gh api "repos/$repo/releases/$releaseId/assets" 2>$null

            if ([string]::IsNullOrWhiteSpace($assetsJson)) {
              Write-Host 'API 返回空响应，跳过清理。'
              exit 0
            }

            $assets = $assetsJson | ConvertFrom-Json

            if ($null -eq $assets -or $assets.Count -eq 0) {
              Write-Host '该 release 没有已存在的资产。'
              exit 0
            }

            foreach ($asset in $assets) {
              if ($asset.id -and $asset.name) {
                Write-Host "删除资产: $($asset.name) (ID: $($asset.id))"
                gh api --method DELETE "repos/$repo/releases/$releaseId/assets/$($asset.id)" 2>$null
              }
            }
          } catch {
            Write-Host "清理资产时出现异常（可忽略）: $_"
          }

  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: prepare_release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            nm3u8_asset_key: win-x64
            nm3u8_asset_ext: .zip
            nm3u8_target: N_m3u8DL-RE.exe
            bundle_targets: nsis
          # 暂不发布 Windows ARM64：wreq 依赖的 BoringSSL（boring-sys2）在
          # aarch64-pc-windows-msvc 上无法汇编 ARM64 crypto 汇编（NASM 不支持
          # ARM64），链接报 40 个 unresolved external。Windows 11 ARM64 可通过
          # 内置 x64 仿真运行 x64 包，故仅发 x64。

          - platform: macos
            arch: x64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            nm3u8_asset_key: osx-x64
            nm3u8_asset_ext: .tar.gz
            nm3u8_target: N_m3u8DL-RE
            bundle_targets: app,dmg
          - platform: macos
            arch: arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
            nm3u8_asset_key: osx-arm64
            nm3u8_asset_ext: .tar.gz
            nm3u8_target: N_m3u8DL-RE
            bundle_targets: app,dmg
          - platform: linux
            arch: x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            nm3u8_asset_key: linux-x64
            nm3u8_asset_ext: .tar.gz
            nm3u8_target: N_m3u8DL-RE
            bundle_targets: appimage,deb
          - platform: linux
            arch: arm64
            runner: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            nm3u8_asset_key: linux-arm64
            nm3u8_asset_ext: .tar.gz
            nm3u8_target: N_m3u8DL-RE
            bundle_targets: appimage,deb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Print build environment
        shell: pwsh
        run: |
          Write-Host "::group::构建环境"
          Write-Host "平台          : ${{ matrix.platform }}-${{ matrix.arch }}"
          Write-Host "Runner        : ${{ matrix.runner }}"
          Write-Host "Rust target   : ${{ matrix.rust_target }}"
          Write-Host "Bundle targets: ${{ matrix.bundle_targets }}"
          Write-Host "Tag           : ${{ github.ref_name }}"
          Write-Host "rustc         : $(rustc --version)"
          Write-Host "cargo         : $(cargo --version)"
          Write-Host "bun           : $(bun --version)"
          Write-Host "::endgroup::"

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          echo "::group::安装 Linux 系统依赖"
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            xdg-utils
          echo "::endgroup::"

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Validate app versions
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.Substring(1)
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $tauriConfig = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw
          $cargoVersionMatch = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"([^"]+)"\s*$')

          if (-not $cargoVersionMatch.Success) {
            throw '未能从 src-tauri/Cargo.toml 解析 version。'
          }

          $cargoVersion = $cargoVersionMatch.Groups[1].Value
          $mismatches = @()

          if ($package.version -ne $version) {
            $mismatches += "package.json=$($package.version)"
          }

          if ($tauriConfig.version -ne $version) {
            $mismatches += "src-tauri/tauri.conf.json=$($tauriConfig.version)"
          }

          if ($cargoVersion -ne $version) {
            $mismatches += "src-tauri/Cargo.toml=$cargoVersion"
          }

          if ($mismatches.Count -gt 0) {
            throw "版本不一致。tag=$version, $($mismatches -join ', ')"
          }

          Write-Host "✅ 版本一致性校验通过：package.json / tauri.conf.json / Cargo.toml 均为 $version"

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          Write-Host "::group::安装前端依赖（bun install --frozen-lockfile）"
          bun install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) { throw "bun install 失败（exit=$LASTEXITCODE）。" }
          Write-Host "::endgroup::"

      - name: Validate release updater config
        shell: pwsh
        run: |
          $releaseConfig = Get-Content 'src-tauri/tauri.release.conf.json' -Raw | ConvertFrom-Json
          $updaterConfig = $releaseConfig.plugins.updater

          if ($null -eq $updaterConfig) {
            throw 'src-tauri/tauri.release.conf.json 缺少 plugins.updater 配置。'
          }

          if ([string]::IsNullOrWhiteSpace($updaterConfig.pubkey)) {
            throw 'src-tauri/tauri.release.conf.json 缺少 updater.pubkey。'
          }

          if ($null -eq $updaterConfig.endpoints -or $updaterConfig.endpoints.Count -eq 0) {
            throw 'src-tauri/tauri.release.conf.json 缺少 updater.endpoints。'
          }

          if ([string]::IsNullOrWhiteSpace('${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}')) {
            throw '缺少 Secret TAURI_SIGNING_PRIVATE_KEY，无法生成 updater 签名。'
          }

          Write-Host "✅ updater 配置与签名密钥校验通过（pubkey / endpoints / 私钥 均就绪）"

      - name: Download N_m3u8DL-RE
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Write-Host "::group::下载 N_m3u8DL-RE sidecar（${{ matrix.nm3u8_asset_key }}${{ matrix.nm3u8_asset_ext }}）"
          $releaseApi = 'https://api.github.com/repos/nilaoda/N_m3u8DL-RE/releases?per_page=10'
          $headers = @{
            'User-Agent' = 'javm-release-workflow'
            'Accept' = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }

          if ($env:GITHUB_TOKEN) {
            $headers['Authorization'] = "Bearer $($env:GITHUB_TOKEN)"
          }

          try {
            $releases = Invoke-RestMethod -Headers $headers -Uri $releaseApi
          } catch {
            $message = $_.ErrorDetails.Message
            if ($message -and $message -match 'API rate limit exceeded') {
              throw '调用 GitHub Releases API 时触发限流。工作流已改为使用 GITHUB_TOKEN 认证；若仍失败，请检查当前仓库 Actions token 权限或稍后重试。'
            }
            throw
          }

          $release = $releases | Where-Object { -not $_.draft } | Select-Object -First 1

          if (-not $release) {
            throw '未找到 N_m3u8DL-RE 的可用 GitHub Release。'
          }

          $assetKey = '${{ matrix.nm3u8_asset_key }}'
          $assetExt = '${{ matrix.nm3u8_asset_ext }}'
          $escapedAssetKey = [regex]::Escape($assetKey)
          $escapedAssetExt = [regex]::Escape($assetExt)
          $assetPattern = "(?:^|_)$escapedAssetKey(?:_|$).*${escapedAssetExt}$"
          $asset = $release.assets | Where-Object { $_.name -match $assetPattern } | Select-Object -First 1

          if (-not $asset) {
            throw "未在 Release $($release.tag_name) 中找到资产 key=$assetKey, ext=$assetExt。"
          }

          $downloadPath = Join-Path $env:RUNNER_TEMP $asset.name
          $extractDir = Join-Path $env:RUNNER_TEMP 'nm3u8dl-extract'
          $binDir = Join-Path $PWD 'src-tauri/bin'
          $targetPath = Join-Path $binDir '${{ matrix.nm3u8_target }}'

          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Get-ChildItem -Path $binDir -File -Filter 'N_m3u8DL-RE*' -ErrorAction SilentlyContinue | Remove-Item -Force

          Write-Host "Downloading $($asset.name) from $($release.tag_name)"
          Invoke-WebRequest -Headers $headers -Uri $asset.browser_download_url -OutFile $downloadPath

          if ($asset.name.EndsWith('.zip')) {
            Expand-Archive -Path $downloadPath -DestinationPath $extractDir -Force
          } else {
            tar -xzf $downloadPath -C $extractDir
          }

          $binary = Get-ChildItem -Path $extractDir -Recurse -File | Where-Object {
            $_.Name -eq 'N_m3u8DL-RE' -or $_.Name -eq 'N_m3u8DL-RE.exe'
          } | Select-Object -First 1

          if (-not $binary) {
            throw '解压后未找到 N_m3u8DL-RE 可执行文件。'
          }

          Copy-Item $binary.FullName $targetPath -Force

          if ('${{ matrix.platform }}' -ne 'windows') {
            chmod +x $targetPath
          }

          Write-Host "✅ N_m3u8DL-RE 就绪：$targetPath"
          Write-Host "::endgroup::"

      - name: Download FFmpeg
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "::group::下载 FFmpeg sidecar（${{ matrix.platform }}-${{ matrix.arch }}）"
          $target = '${{ matrix.platform }}-${{ matrix.arch }}'
          $binDir = Join-Path $PWD 'src-tauri/bin'
          $downloadDir = Join-Path $env:RUNNER_TEMP 'ffmpeg-download'
          $extractDir = Join-Path $env:RUNNER_TEMP 'ffmpeg-extract'

          foreach ($d in @($downloadDir, $extractDir)) {
            if (Test-Path $d) { Remove-Item $d -Recurse -Force }
            New-Item -ItemType Directory -Force -Path $d | Out-Null
          }

          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Get-ChildItem -Path $binDir -File -Filter 'ffmpeg*' -ErrorAction SilentlyContinue | Remove-Item -Force

          $releaseTag = gh release list --repo ddmoyu/ffmepg --limit 20 --json tagName --jq '[.[] | select(.tagName | startswith("javm-ffmpeg-"))][0].tagName'

          if (-not $releaseTag) {
            throw '未找到 ddmoyu/ffmepg 的 javm-ffmpeg-* Release。'
          }

          Write-Host "Downloading javm-ffmpeg for $target from release $releaseTag"
          gh release download $releaseTag --repo ddmoyu/ffmepg --pattern "javm-ffmpeg-$target-*.zip" --dir $downloadDir

          $zip = Get-ChildItem "$downloadDir/*.zip" | Select-Object -First 1
          if (-not $zip) {
            throw "未找到匹配 javm-ffmpeg-$target-*.zip 的资产。"
          }

          Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force

          $ffmpegBin = if ('${{ matrix.platform }}' -eq 'windows') { 'ffmpeg.exe' } else { 'ffmpeg' }
          # 必须加 -File：压缩包内除 bin/ffmpeg 可执行文件外，还有同名的 share/ffmpeg 目录，
          # 不加 -File 时 -First 1 可能误选目录（arm64 即因此失败）。
          $ffmpeg = Get-ChildItem $extractDir -Recurse -File -Filter $ffmpegBin | Select-Object -First 1

          if (-not $ffmpeg) {
            throw "解压后未找到 $ffmpegBin。"
          }

          $targetPath = Join-Path $binDir $ffmpeg.Name
          Copy-Item $ffmpeg.FullName $targetPath -Force

          if ('${{ matrix.platform }}' -ne 'windows') {
            chmod +x $targetPath
          }

          Write-Host "✅ FFmpeg 就绪：$targetPath"
          Write-Host "::endgroup::"

      - name: Verify bundled sidecars
        shell: pwsh
        run: |
          $binDir = Join-Path $PWD 'src-tauri/bin'
          Write-Host "::group::校验 sidecar 二进制"
          if (-not (Test-Path $binDir)) {
            throw "未找到 sidecar 目录：$binDir"
          }
          $files = Get-ChildItem -Path $binDir -File
          if (-not $files) {
            throw "sidecar 目录为空：$binDir"
          }
          foreach ($f in $files) {
            $sizeKb = [math]::Round($f.Length / 1KB, 1)
            Write-Host ("  {0} ({1} KB)" -f $f.Name, $sizeKb)
          }
          if (-not ($files | Where-Object { $_.Name -like 'N_m3u8DL-RE*' })) {
            throw '校验失败：bin 目录缺少 N_m3u8DL-RE。'
          }
          if (-not ($files | Where-Object { $_.Name -like 'ffmpeg*' })) {
            throw '校验失败：bin 目录缺少 ffmpeg。'
          }
          Write-Host "✅ sidecar 校验通过，将被打包进 resources。"
          Write-Host "::endgroup::"

      - name: Resolve bundle targets
        id: bundle_targets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.Substring(1)
          $targets = '${{ matrix.bundle_targets }}'

          if ($version -match '-') {
            if ('${{ matrix.platform }}' -eq 'windows' -and '${{ matrix.arch }}' -ne 'x86') {
              $targets = 'nsis'
            }
          }

          "targets=$targets" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "✅ 本次打包目标：$targets"

      - name: Build Tauri app and upload assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 失败时打印 Rust 调用栈，便于定位编译/打包错误
          RUST_BACKTRACE: "1"
        with:
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseBody: ${{ needs.prepare_release.outputs.release_body }}
          releaseDraft: true
          prerelease: ${{ needs.prepare_release.outputs.is_prerelease == 'true' }}
          projectPath: .
          tauriScript: bun tauri
          retryAttempts: 2
          includeUpdaterJson: true
          # --verbose 输出 cargo/bundler 详细日志；前端由 beforeBuildCommand（bun run build）构建
          args: >-
            --config src-tauri/tauri.release.conf.json
            --target "${{ matrix.rust_target }}"
            --bundles "${{ steps.bundle_targets.outputs.targets }}"
            --verbose

      - name: Summarize release build
        if: always()
        shell: pwsh
        run: |
          $summary = $env:GITHUB_STEP_SUMMARY
          $bundleDir = Join-Path $PWD "src-tauri/target/${{ matrix.rust_target }}/release/bundle"

          "## 构建产物 - ${{ matrix.platform }}-${{ matrix.arch }} (${{ job.status }})" | Out-File -FilePath $summary -Append -Encoding utf8

          if (-not (Test-Path $bundleDir)) {
            "未找到打包目录：``$bundleDir``" | Out-File -FilePath $summary -Append -Encoding utf8
            return
          }

          $exts = @('.exe', '.msi', '.dmg', '.deb', '.AppImage', '.sig', '.gz', '.zip')
          $artifacts = Get-ChildItem -Path $bundleDir -Recurse -File |
            Where-Object { $exts -contains $_.Extension } |
            Sort-Object Name

          if (-not $artifacts) {
            "打包目录中未发现可发布产物。" | Out-File -FilePath $summary -Append -Encoding utf8
            return
          }

          "| 文件 | 大小 (MB) |" | Out-File -FilePath $summary -Append -Encoding utf8
          "| --- | ---: |" | Out-File -FilePath $summary -Append -Encoding utf8
          foreach ($a in $artifacts) {
            $sizeMb = [math]::Round($a.Length / 1MB, 2)
            "| $($a.Name) | $sizeMb |" | Out-File -FilePath $summary -Append -Encoding utf8
            Write-Host ("产物：{0} ({1} MB)" -f $a.Name, $sizeMb)
          }

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v') && needs.build-release.result == 'success'
    needs: [prepare_release, build-release]
    runs-on: windows-latest
    steps:
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = '${{ github.repository }}'
          $releaseId = '${{ needs.prepare_release.outputs.release_id }}'
          $isPrerelease = '${{ needs.prepare_release.outputs.is_prerelease }}'

          if ([string]::IsNullOrWhiteSpace($releaseId)) {
            throw '缺少 release_id，无法正式发布 GitHub Release。'
          }

          gh api --method PATCH "repos/$repo/releases/$releaseId" `
            -F draft=false `
            -F prerelease=$isPrerelease | Out-Null

  cleanup-release:
    # 必须用 always()：依赖 job 失败时，不含状态函数的 if 会被 GitHub 隐式 success() 门控跳过，
    # 导致失败后草稿 Release 无法清理。always() 让本 job 在非成功（含取消）时也执行清理。
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') && needs.build-release.result != 'success' }}
    needs: [prepare_release, build-release]
    runs-on: windows-latest
    steps:
      - name: Delete draft release after failed build
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = '${{ github.repository }}'
          $releaseId = '${{ needs.prepare_release.outputs.release_id }}'

          if ([string]::IsNullOrWhiteSpace($releaseId)) {
            Write-Host '缺少 release_id，跳过草稿 Release 清理。'
            exit 0
          }

          gh api --method DELETE "repos/$repo/releases/$releaseId"